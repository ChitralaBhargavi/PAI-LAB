<!DOCTYPE html>
<html>
<head>
    <title>MovieBot 🎬</title>

    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg.jpg') }}");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h2 {
            font-size: 50px;       /* BIG heading */
            margin-top: 80px;      /* move towards center */
        }

        form {
            background-color: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            margin-top: 30px;
        }

        select, input {
            width: 90%;
            padding: 5px;
        }

        button {
            padding: 8px 15px;
            background-color: #ff4b2b;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style-type: none;
        }

        li {
            background-color: rgba(0,0,0,0.6);
            margin: 5px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }
    </style>

</head>
<body>

<h2>🎬 AI Movie Suggestion Chatbot</h2>

<form method="POST">

    Genre:
    <select name="genre">
        <option value="">Select Genre</option>
        {% for g in genres %}
            <option value="{{ g }}">{{ g }}</option>
        {% endfor %}
    </select>
    <br><br>

    Director:
    <select name="director">
        <option value="">Select Director</option>
        {% for d in directors %}
            <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
    </select>
    <br><br>

    Cast:
    <select name="cast">
        <option value="">Select Cast</option>
        {% for c in casts %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>
    <br><br>

    Rating:
    <select name="rating">
        <option value="">Select Rating</option>
        {% for r in ratings %}
            <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
    </select>
    <br><br>

    <button type="submit">Search</button>
</form>

{% if movies is not none %}
    <h3>Recommended Movies:</h3>

    {% if movies.empty %}
        <p>No movies found 😢</p>
    {% else %}
        <ul>
        {% for index, row in movies.iterrows() %}
            <li>{{ row['Movie'] }}</li>
        {% endfor %}
        </ul>
    {% endif %}
{% endif %}

</body>
</html>
